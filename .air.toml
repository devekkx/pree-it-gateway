root = "."
tmp_dir = "tmp"

[build]
  cmd              = "go build -o ./tmp/gateway ./cmd/gateway"
  bin              = "./tmp/gateway"
  full_bin         = "./tmp/gateway"
  include_ext      = ["go", "tpl", "tmpl", "html"]
  exclude_dir      = ["assets", "tmp", "vendor"]
  include_dir      = ["."]
  delay            = 1000
  stop_on_error    = true
  send_interrupt   = false
  kill_delay       = "0.5s"
  rerun            = false
  rerun_delay      = 500
  log              = "build-errors.log"

[color]
  main    = "magenta"
  watcher = "cyan"
  build   = "yellow"
  runner  = "green"

[log]
  time = true

[misc]
  clean_on_exit = true